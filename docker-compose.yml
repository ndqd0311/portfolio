version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: portfolio-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: portfolio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d portfolio"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: API/Dockerfile
    container_name: portfolio-api
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=portfolio;Username=postgres;Password=postgres
      - JwtSettings__Secret=SuperSecretKeyForJWTAuthThatIsVeryLongAndSecure123!
      - JwtSettings__Issuer=PortfolioAPI
      - JwtSettings__Audience=PortfolioClient
      - JwtSettings__ExpiryInMinutes=60
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      db:
        condition: service_healthy
    restart: always

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: portfolio-client
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - api
    restart: always

volumes:
  postgres_data:
